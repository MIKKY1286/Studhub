<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Forgot Password - Stuent</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  font-family:'Poppins', sans-serif;
}

.loader{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

</style>

</head>

<body class="bg-[#f3e9e3] overflow-x-hidden">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- LEFT -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl">

      <!-- HEADER -->
      <div class="mb-8">

        <h1 class="text-3xl font-bold text-gray-800">
          Forgot Password
        </h1>

        <p class="text-gray-500 mt-2 leading-relaxed">
          Enter your email address and we'll send you a password reset link.
        </p>

      </div>

      <!-- FORM -->
      <form id="forgotPasswordForm" class="space-y-5">

        <!-- EMAIL -->
        <div>

          <label class="text-sm text-gray-600 mb-2 block">
            Email Address
          </label>

          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
          >

        </div>

        <!-- BUTTON -->
        <button
          id="resetBtn"
          type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-full font-semibold transition duration-300 flex items-center justify-center gap-2"
        >

          <span id="btnText">
            Send Reset Link
          </span>

        </button>

      </form>

      <!-- LOGIN -->
      <p class="mt-8 text-center text-sm text-gray-600">

        Remember your password?

        <a
          href="login.html"
          class="text-orange-500 font-semibold"
        >
          Login
        </a>

      </p>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="hidden md:flex w-1/2 bg-orange-500 items-center justify-center p-12 text-white relative overflow-hidden">

    <div class="absolute w-96 h-96 bg-orange-400 rounded-full -top-20 -right-20 opacity-40"></div>

    <div class="absolute w-72 h-72 bg-orange-300 rounded-full -bottom-10 -left-10 opacity-30"></div>

    <div class="relative z-10 text-center max-w-lg">

      <h2 class="text-5xl font-bold leading-tight">
        Reset Your Password
      </h2>

      <p class="mt-6 text-lg opacity-90 leading-relaxed">
        Don’t worry. It happens. We’ll help you regain access to your account quickly and securely.
      </p>

    </div>

  </div>

</div>

<script type="module">

import {
  resetPassword
} from "./assets/js/firebase.js";

const form =
document.getElementById(
  "forgotPasswordForm"
);

const resetBtn =
document.getElementById(
  "resetBtn"
);

const btnText =
document.getElementById(
  "btnText"
);


// SUBMIT
form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email =
  document.getElementById("email")
  .value.trim();

  if(!email){

    Swal.fire(
      "Error",
      "Please enter your email",
      "error"
    );

    return;

  }

  resetBtn.disabled = true;

  btnText.innerHTML = `
    <div class="loader"></div>
  `;

  try{

    await resetPassword(email);

    Swal.fire({
      icon:"success",
      title:"Reset Link Sent",
      text:"Check your email for password reset instructions"
    });

    form.reset();

  }

  catch(error){

    Swal.fire(
      "Error",
      error.message,
      "error"
    );

  }

  finally{

    resetBtn.disabled = false;

    btnText.innerHTML =
    "Send Reset Link";

  }

});

</script>

</body>
</html>
