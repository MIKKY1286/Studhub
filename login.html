<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - StudHub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { font-family: 'Poppins', sans-serif; }
</style>
</head>

<body class="bg-[#f3e9e3]">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- LEFT SIDE -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

      <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
      <p class="text-gray-500 mb-6">Login to your StudHub account</p>

      <form id="loginForm" class="space-y-4">

        <!-- EMAIL -->
        <input 
          id="email"
          type="email" 
          placeholder="Email Address"
          required
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
        >

        <!-- PASSWORD -->
        <div class="relative">
          <input 
            id="password"
            type="password" 
            placeholder="Password"
            required
            class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
          >
          <span 
            onclick="togglePassword()" 
            class="absolute right-4 top-3 cursor-pointer text-gray-500"
          >👁</span>
        </div>

        <!-- SUBMIT -->
        <button 
          type="submit"
          class="w-full bg-orange-500 text-white py-3 rounded-full hover:scale-105 transition"
        >
          Login
        </button>

      </form>

      <!-- SIGNUP LINK -->
      <p class="mt-6 text-sm text-gray-600">
        Don’t have an account?
        <a href="signup.html" class="text-orange-500 font-medium">Sign Up</a>
      </p>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="hidden md:flex w-1/2 bg-orange-500 items-center justify-center text-white p-10">

    <div class="max-w-md text-center space-y-4">
      <h2 class="text-4xl font-bold">
        Welcome Back
      </h2>
      <p class="opacity-90">
        Continue managing your academic life smarter with StudHub.
      </p>
    </div>

  </div>

</div><a href=""></a>

<!-- PASSWORD TOGGLE -->
<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

<!-- FIREBASE LOGIN -->
<script type="module">

import { login } from "./assets/js/firebase.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await login(email, password);

    Swal.fire("Success", "Login successful", "success")
    .then(() => {
      window.location.href = "./dashboard.html"; // change if needed
    });

  } catch (err) {
    Swal.fire("Error", err.message, "error");
  }
});

</script>

</body>
</html>
