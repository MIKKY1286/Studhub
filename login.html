<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

<title>Login - Stuent</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  font-family: 'Poppins', sans-serif;
}

.loader{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

</style>

</head>

<body class="bg-[#f3e9e3] overflow-x-hidden">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- LEFT -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl">

      <!-- HEADER -->
      <div class="mb-8">

        <h1 class="text-3xl font-bold text-gray-800">
          Welcome Back
        </h1>

        <p class="text-gray-500 mt-2">
          Login to continue your academic journey
        </p>

      </div>

      <!-- FORM -->
      <form id="loginForm" class="space-y-5">

        <!-- EMAIL -->
        <div>

          <label class="text-sm text-gray-600 mb-2 block">
            Email Address
          </label>

          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
            class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
          >

        </div>

        <!-- PASSWORD -->
        <div>

          <label class="text-sm text-gray-600 mb-2 block">
            Password
          </label>

          <div class="relative">

            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              required
              class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
            >

            <button
              type="button"
              id="togglePassword"
              class="absolute top-1/2 right-4 -translate-y-1/2 text-gray-500"
            >
              👁
            </button>

          </div>

        </div>

        <!-- REMEMBER -->
        <div class="flex items-center justify-between text-sm">

          <label class="flex items-center gap-2 text-gray-600">

            <input
              type="checkbox"
              id="rememberMe"
            >

            Remember me

          </label>

          <a
            href="forgot-password.html"
            class="text-orange-500 font-medium"
          >
            Forgot Password?
          </a>

        </div>

        <!-- BUTTON -->
        <button
          id="loginBtn"
          type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-full font-semibold transition duration-300 flex items-center justify-center gap-2"
        >

          <span id="btnText">
            Login
          </span>

        </button>

      </form>

      <!-- DIVIDER -->
      <div class="flex items-center my-6">

        <div class="flex-1 h-px bg-gray-300"></div>

        <span class="px-3 text-sm text-gray-500">
          or continue with
        </span>

        <div class="flex-1 h-px bg-gray-300"></div>

      </div>

      <!-- GOOGLE -->
      <button
        id="googleLogin"
        class="w-full border border-gray-200 hover:bg-gray-50 py-4 rounded-xl flex items-center justify-center gap-3 transition"
      >

        <img
          src="https://www.svgrepo.com/show/475656/google-color.svg"
          class="w-5"
        >

        Continue with Google

      </button>

      <!-- GITHUB -->
      <button
        id="githubLogin"
        class="w-full border border-gray-200 hover:bg-gray-50 py-4 rounded-xl flex items-center justify-center gap-3 mt-4 transition"
      >

        <img
          src="https://www.svgrepo.com/show/512317/github-142.svg"
          class="w-5"
        >

        Continue with GitHub

      </button>

      <!-- SIGNUP -->
      <p class="mt-8 text-center text-sm text-gray-600">

        Don’t have an account?

        <a
          href="signup.html"
          class="text-orange-500 font-semibold"
        >
          Create Account
        </a>

      </p>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="hidden md:flex w-1/2 bg-orange-500 items-center justify-center p-12 text-white relative overflow-hidden">

    <div class="absolute w-96 h-96 bg-orange-400 rounded-full -top-20 -right-20 opacity-40"></div>

    <div class="absolute w-72 h-72 bg-orange-300 rounded-full -bottom-10 -left-10 opacity-30"></div>

    <div class="relative z-10 text-center max-w-lg">

      <h2 class="text-5xl font-bold leading-tight">
        Welcome Back to Stuent
      </h2>

      <p class="mt-6 text-lg opacity-90 leading-relaxed">
        Continue uploading assignments, using AI tools,
        converting files, and managing your academic life smarter.
      </p>

    </div>

  </div>

</div>

<!-- PASSWORD TOGGLE -->
<script>

const passwordInput =
document.getElementById("password");

document
.getElementById("togglePassword")
.addEventListener("click", () => {

  passwordInput.type =
  passwordInput.type === "password"
  ? "text"
  : "password";

});

</script>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("kB2hGEEEYAYTlYaKb");
</script>

<!-- AUTH -->
<script type="module" src="./assets/js/auth.js"></script>

</body>
</html>
