<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

<title>Sign Up - Stuent</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  font-family: 'Poppins', sans-serif;
}

.loader{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}
</style>
</head>

<body class="bg-[#f3e9e3] overflow-x-hidden">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- LEFT -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl">

      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">
          Create Account
        </h1>

        <p class="text-gray-500 mt-2">
          Start your journey with Stuent
        </p>
      </div>

      <form id="signupForm" class="space-y-4">

        <!-- FULL NAME -->
        <div>
          <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
            class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
          >
        </div>

        <!-- EMAIL -->
        <div>
          <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
            class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
          >
        </div>

        <!-- PASSWORD -->
        <div class="relative">

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            minlength="6"
            class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400"
          >

          <button
            type="button"
            id="togglePassword"
            class="absolute top-1/2 right-4 -translate-y-1/2 text-gray-500"
          >
            👁
          </button>

        </div>

        <!-- PASSWORD STRENGTH -->
        <div>
          <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
            <div id="strengthBar" class="h-full w-0 transition-all duration-300"></div>
          </div>

          <p id="strengthText" class="text-sm mt-1 text-gray-500"></p>
        </div>

        <!-- TERMS -->
        <div class="flex items-start gap-2">

          <input
            type="checkbox"
            id="terms"
            required
            class="mt-1"
          >

          <label for="terms" class="text-sm text-gray-600">
            I agree to the Terms and Conditions
          </label>

        </div>

        <!-- BUTTON -->
        <button
          id="signupBtn"
          type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-full font-semibold transition duration-300 flex items-center justify-center gap-2"
        >
          <span id="btnText">Create Account</span>
        </button>

      </form>

      <!-- DIVIDER -->
      <div class="flex items-center my-6">

        <div class="flex-1 h-px bg-gray-300"></div>

        <span class="px-3 text-sm text-gray-500">
          or
        </span>

        <div class="flex-1 h-px bg-gray-300"></div>

      </div>

      <!-- GOOGLE -->
      <button
        id="googleSignup"
        class="w-full border border-gray-200 hover:bg-gray-50 py-4 rounded-xl flex items-center justify-center gap-3 transition"
      >

        <img
          src="https://www.svgrepo.com/show/475656/google-color.svg"
          class="w-5"
        >

        Continue with Google

      </button>

      <!-- GITHUB -->
      <button
        id="githubSignup"
        class="w-full border border-gray-200 hover:bg-gray-50 py-4 rounded-xl flex items-center justify-center gap-3 mt-4 transition"
      >

        <img
          src="https://www.svgrepo.com/show/512317/github-142.svg"
          class="w-5"
        >

        Continue with GitHub

      </button>

      <!-- LOGIN -->
      <p class="text-center text-sm text-gray-600 mt-6">

        Already have an account?

        <a
          href="login.html"
          class="text-orange-500 font-semibold"
        >
          Login
        </a>

      </p>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="hidden md:flex w-1/2 bg-orange-500 items-center justify-center p-12 text-white relative overflow-hidden">

    <div class="absolute w-96 h-96 bg-orange-400 rounded-full -top-20 -right-20 opacity-40"></div>

    <div class="absolute w-72 h-72 bg-orange-300 rounded-full -bottom-10 -left-10 opacity-30"></div>

    <div class="relative z-10 text-center max-w-lg">

      <h2 class="text-5xl font-bold leading-tight">
        Welcome to Stuent
      </h2>

      <p class="mt-6 text-lg opacity-90 leading-relaxed">
        Upload assignments, use AI tools, convert files,
        collaborate with students, and manage your
        academic life smarter.
      </p>

    </div>

  </div>

</div>

<script type="module" src="./assets/js/signup.js"></script>

</body>
</html>
