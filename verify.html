<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP - Stuent</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{ font-family: 'Poppins', sans-serif; }

.loader{
  width:18px;
  height:18px;
  border:2px solid #fff;
  border-top:2px solid transparent;
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.otp-box{
  width:52px;
  height:55px;
  text-align:center;
  font-size:22px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

.otp-box:focus{
  border:2px solid #f97316;
}

.shake{
  animation: shake 0.4s;
}

@keyframes shake{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-5px); }
  50%{ transform:translateX(5px); }
  75%{ transform:translateX(-5px); }
}
</style>

</head>

<body class="bg-[#f3e9e3] overflow-x-hidden">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- LEFT -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl text-center">

      <h1 class="text-3xl font-bold text-gray-800">
        Verify OTP
      </h1>

      <p class="text-gray-500 mt-2">
        Enter the 6-digit code sent to your email
      </p>

      <!-- OTP BOXES -->
      <div class="flex justify-center gap-2 mt-6" id="otpContainer">

        <input maxlength="1" class="otp-box" />
        <input maxlength="1" class="otp-box" />
        <input maxlength="1" class="otp-box" />
        <input maxlength="1" class="otp-box" />
        <input maxlength="1" class="otp-box" />
        <input maxlength="1" class="otp-box" />

      </div>

      <button
        id="verifyBtn"
        class="w-full mt-6 bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-full font-semibold flex items-center justify-center"
      >
        Verify OTP
      </button>

      <p class="mt-4 text-sm text-gray-600">
        Didn’t receive code?
        <span id="resendOtp" class="text-orange-500 cursor-pointer font-medium">
          Resend
        </span>
        <span id="timer" class="text-gray-400 ml-2"></span>
      </p>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="hidden md:flex w-1/2 bg-orange-500 items-center justify-center p-12 text-white relative overflow-hidden">

    <div class="absolute w-96 h-96 bg-orange-400 rounded-full -top-20 -right-20 opacity-40"></div>
    <div class="absolute w-72 h-72 bg-orange-300 rounded-full -bottom-10 -left-10 opacity-30"></div>

    <div class="relative z-10 text-center max-w-lg">

      <h2 class="text-5xl font-bold">
        Almost There 🎉
      </h2>

      <p class="mt-6 text-lg opacity-90">
        Just verify your email to unlock your dashboard, AI tools, and assignments.
      </p>

    </div>

  </div>

</div>

<script type="module" src="./assets/js/verify.js"></script>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>emailjs.init("kB2hGEEEYAYTlYaKb");</script>

</body>
</html>
